services:
  postgres:
    image: postgres:17-alpine
    container_name: tariffshield-postgres
    environment:
      POSTGRES_DB: tariffshield
      POSTGRES_USER: tariffshield
      POSTGRES_PASSWORD: tariffshield_dev_password
    ports:
      - "5443:5432"
    volumes:
      - tariffshield_pg:/var/lib/postgresql/data
    networks:
      - tariffshield-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tariffshield -d tariffshield"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    container_name: tariffshield-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgres://tariffshield:tariffshield_dev_password@postgres:5432/tariffshield
    ports:
      - "3002:3002"
    networks:
      - tariffshield-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: tariffshield-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - "3000:3000"
    networks:
      - tariffshield-net

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tariffshield-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - tariffshield-net

networks:
  tariffshield-net:
    driver: bridge

volumes:
  tariffshield_pg:
