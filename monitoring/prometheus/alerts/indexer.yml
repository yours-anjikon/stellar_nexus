groups:
  - name: contract-event-indexer-alerts
    rules:
      - alert: ContractEventIndexerHighLag
        expr: contract_event_indexer_lag_ledgers > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "TariffShield contract event indexer high lag"
          description: "The contract event indexer has been lagging by {{ $value }} ledgers (> 10) for more than 2 minutes."

      - alert: ContractEventIndexerStalled
        expr: delta(contract_event_indexer_lag_ledgers[5m]) == 0 and contract_event_indexer_lag_ledgers > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TariffShield contract event indexer stalled"
          description: "The contract event indexer lag has not decreased for more than 5 minutes, indicating that the indexer process has stalled."
