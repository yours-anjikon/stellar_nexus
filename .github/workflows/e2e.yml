name: E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: ["main", "develop"]
    paths:
      - "apps/web/**"
      - "e2e/**"

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: brandblitz
          POSTGRES_PASSWORD: brandblitz_dev
          POSTGRES_DB: brandblitz
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Seed test database
        run: |
          psql -h localhost -U brandblitz -d brandblitz -f init.sql
        env:
          PGPASSWORD: brandblitz_dev

      - name: Seed E2E Challenge
        run: pnpm tsx scripts/seed-e2e-challenge.ts
        env:
          DATABASE_URL: postgresql://brandblitz:brandblitz_dev@localhost:5432/brandblitz

      - name: Run E2E tests
        run: pnpm --filter @brandblitz/web exec playwright test
        env:
          DATABASE_URL: postgresql://brandblitz:brandblitz_dev@localhost:5432/brandblitz
          NODE_ENV: test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
