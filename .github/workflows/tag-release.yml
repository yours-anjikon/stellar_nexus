name: Tag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g., v1.2.3)'
        required: true
        default: 'v0.1.0'

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT (Personal Access Token) stored as PAT_TOKEN instead of
          # GITHUB_TOKEN so that the tag push triggers downstream CI workflows
          # (e.g., build/publish on tag). GITHUB_TOKEN deliberately does not
          # trigger other workflows to prevent infinite loops.
          token: ${{ secrets.PAT_TOKEN }}

      - name: Git Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
