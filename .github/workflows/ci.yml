name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run contract tests
      run: npm run contract:test

    - name: Build packages and API
      run: npm run build

    - name: Inject and Upload Express API Source Maps to Sentry
      run: |
        npx @sentry/cli sourcemaps inject ./apps/api/dist
        npx @sentry/cli sourcemaps upload ./apps/api/dist
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_API_PROJECT }}

    - name: Build Next.js Web Dashboard and Upload Source Maps
      run: npm run build --workspace=apps/web
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_WEB_PROJECT }}
