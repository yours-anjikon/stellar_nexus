name: Publish Docker images to GHCR

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build and push multi-arch images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]

    env:
      IMAGE_ORG: ritik4ever

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.IMAGE_ORG }}/stellar-goal-vault-${{ matrix.service }}:latest
            ghcr.io/${{ env.IMAGE_ORG }}/stellar-goal-vault-${{ matrix.service }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public (best-effort)
        if: always()
        continue-on-error: true
        run: |
          PACKAGE=stellar-goal-vault-${{ matrix.service }}
          OWNER=${{ env.IMAGE_ORG }}
          echo "Setting visibility for ${PACKAGE} under ${OWNER} (best-effort)"
          # Try org endpoint then user endpoint; ignore failures
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}/visibility \
            -d '{"visibility":"public"}' || true
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user/packages/container/${PACKAGE}/visibility \
            -d '{"visibility":"public"}' || true
