version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-dependencies:
        dependency-type: production
      dev-dependencies:
        dependency-type: development
    assignees:
      - vjuliaife
    reviewers:
      - vjuliaife

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - vjuliaife
    reviewers:
      - vjuliaife

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - vjuliaife
    reviewers:
      - vjuliaife
