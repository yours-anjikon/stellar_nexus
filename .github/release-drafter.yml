name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📦 Maintenance'
    labels:
      - 'chore'
      - 'deps'
      - 'dependencies'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking-change'
  minor:
    labels:
      - 'feat'
      - 'feature'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'chore'
      - 'docs'
      - 'security'
  default: patch
template: |
  ## Changes

  $CHANGES

  ---

  **Docker image:** `ghcr.io/$GITHUB_REPOSITORY:$RESOLVED_VERSION`
  **Deployment:** $RENDER_DEPLOY_URL
